name: Test and Deploy to GitHub Pages

# push / PR でテストを実行し、main への push ではテスト成功時のみ web/ を GitHub Pages へ公開する。
# 手動実行（Actions 画面の Run workflow）も可能。
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに（古い公開ジョブはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ① 計算エンジンの単体テスト（依存ゼロ・node:test）
  test:
    runs-on: ubuntu-latest
    steps:
      - name: ソース取得
        uses: actions/checkout@v4
      - name: Node セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: テスト実行
        run: npm test

  # ② テスト成功時のみ公開（main への push のみ）
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: ソース取得
        uses: actions/checkout@v4
      - name: 最新データを公開物へ同梱（data/ → web/data/）
        run: |
          rm -rf web/data
          cp -r data web/data
      - name: Pages 設定
        uses: actions/configure-pages@v5
      - name: web/ を公開物としてアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
