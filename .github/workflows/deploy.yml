name: Deploy web/ to GitHub Pages

# main ブランチに push するたびに web/ フォルダを GitHub Pages として公開する。
# 手動実行（Actions 画面の Run workflow）も可能。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに（古い公開ジョブはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: ソース取得
        uses: actions/checkout@v4
      - name: Pages 設定
        uses: actions/configure-pages@v5
      - name: web/ を公開物としてアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
